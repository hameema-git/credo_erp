{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Service</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: #f5f6fa;
            font-family: Calibri, sans-serif;
        }

        /* MAIN BOX */
        .container-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-top: 15px;
            width: 100%;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            height: 70px;
        }

        .company-info {
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        /* FORM */
        .form-control {
            border-radius: 6px;
            padding: 10px;
        }

        textarea.form-control {
            resize: none;
        }

        /* BUTTON */
        .btn-gradient {
            background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* 🔥 MOBILE RESPONSIVE */
        @media (max-width: 768px) {

            body {
                margin: 0;
                padding: 0;
            }

            .container-fluid {
                padding-left: 8px;
                padding-right: 8px;
            }

            .container-box {
                padding: 15px;
                border-radius: 8px;
                margin-top: 10px;
            }

            /* HEADER STACK */
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .logo {
                height: 55px;
            }

            .title {
                font-size: 18px;
            }

            .company-info {
                font-size: 12px;
            }

            /* BUTTON STACK */
            .action-buttons {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .action-buttons .btn {
                width: 100%;
            }

        }

    </style>
</head>

<body>

<div class="container-fluid">
<div class="container-box">

    <!-- HEADER -->
    <div class="header">

        <div class="d-flex align-items-center gap-3">

            <img src="{% static 'logo6.png' %}" class="logo">

            <div class="company-info">
                <b>CREDO INTERNATIONAL DIGITAL DESIGNS</b><br>
                Mussaffa 45 - Abu Dhabi, UAE<br>
                TRN: 105189276600001<br>
                📞  +971566981200<br>
                ✉ info@credodesigns.ae
            </div>

        </div>

        <div class="text-md-end">
            <div class="title">ADD SERVICE</div>
            <small class="text-muted">Create new service/product</small>
        </div>

    </div>

    <!-- FORM -->
    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label"><b>Service Name</b></label>
            <input type="text" name="name" class="form-control" placeholder="Enter service name" required>
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Price (AED)</b></label>
            <input type="number" step="0.01" name="price" class="form-control" placeholder="Enter price" required>
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Description</b></label>
            <textarea name="description" rows="3" class="form-control" placeholder="Enter description (optional)"></textarea>
        </div>

        <!-- ACTION -->
        <div class="mt-4 action-buttons">

            <a href="{% url 'create_quotation' %}" class="btn btn-secondary">
                Back
            </a>

            <button type="submit" class="btn btn-gradient">
                Save Service
            </button>

        </div>

    </form>

</div>
</div>

</body>
</html>
