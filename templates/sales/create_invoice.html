{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Create Invoice</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    font-family: Calibri, sans-serif;
    background: #f5f6fa;
}

/* MAIN CARD */
.container-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.logo {
    height: 80px;
}

.company-info {
    font-size: 13px;
    color: #555;
}

/* TABLE */
.table thead {
    background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
    color: white;
}

.table th, .table td {
    vertical-align: middle;
}

/* TEXTAREA */
.desc-box {
    min-height: 40px;
    resize: none;
}

/* TOTAL BOX */
.total-box {
    background: #f1f2f6;
    padding: 15px;
    border-radius: 8px;
}

/* BUTTON */
.btn-gradient {
    background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
    border: none;
    color: white;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {

    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .logo {
        height: 60px;
    }

    .row {
        flex-direction: column;
    }

    .col-md-6 {
        width: 100%;
        margin-bottom: 10px;
    }

    .d-flex {
        flex-direction: column !important;
        gap: 10px;
    }

    .btn {
        width: 100%;
    }

    .table-responsive {
        overflow-x: auto;
    }

    table {
        min-width: 600px;
    }

    .total-box {
        text-align: left !important;
    }
}

@media print {
    button, a {
        display: none !important;
    }
}

</style>
</head>

<body>

<div class="container mt-3">
<div class="container-box">

<!-- HEADER -->
<div class="header">
    <div class="d-flex align-items-center gap-3">
        <img src="{% static 'logo6.png' %}" class="logo">
        <div class="company-info">
            <b>CREDO INTERNATIONAL DIGITAL DESIGNS</b><br>
            TRN: 105189276600001<br>
            Abu Dhabi, UAE<br>
            +971566981200
        </div>
    </div>

    <h4><b>INVOICE</b></h4>
</div>

<form method="post">
{% csrf_token %}

<!-- CUSTOMER -->
<div class="mb-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <label><b>Customer</b></label>
        <a href="{% url 'add_customer' %}" class="btn btn-sm btn-gradient">+ Add Customer</a>
    </div>

    <select name="customer" class="form-select">
        {% for customer in customers %}
        <option value="{{ customer.id }}">{{ customer.name }}</option>
        {% endfor %}
    </select>
</div>

<!-- ATTENTION -->
<div class="row mb-4">
    <div class="col-md-6">
        <label><b>Attn</b></label>
        <input type="text" name="attention" class="form-control">
    </div>

    <div class="col-md-6">
        <label><b>Sales Person</b></label>
        <input type="text" name="sales_person" class="form-control">
    </div>
</div>

<!-- ITEMS -->
<div class="d-flex justify-content-between align-items-center mb-2">
    <h5><b>Items</b></h5>
    <a href="{% url 'add_service' %}" class="btn btn-sm btn-gradient">+ Add Service</a>
</div>

<div class="table-responsive">
<table class="table table-bordered" id="items-table">
<thead>
<tr>
    <th>Description</th>
    <th>Price</th>
    <th>Qty</th>
    <th>Total</th>
    <th>Action</th>
</tr>
</thead>

<tbody>
<tr>

<td>
<select name="service" class="form-select mb-1" onchange="fillDescription(this)">
<option value="">-- Custom Service --</option>
{% for service in services %}
<option value="{{ service.id }}"
        data-price="{{ service.price }}"
        data-description="{{ service.description }}">
    {{ service.name }}
</option>
{% endfor %}
</select>

<textarea name="description" class="form-control desc-box"></textarea>
</td>

<td>
<input type="number" step="0.01" name="price" class="form-control price" oninput="calculateRow(this)">
</td>

<td>
<input type="number" name="quantity" value="1" class="form-control" oninput="calculateRow(this)">
</td>

<td>
<input type="text" class="form-control row-total" readonly>
</td>

<td>
<button type="button" class="btn btn-danger btn-sm" onclick="deleteRow(this)">Delete</button>
</td>

</tr>
</tbody>
</table>
</div>

<button type="button" class="btn btn-secondary mb-3" onclick="addRow()">+ Add Item</button>

<div class="mb-4">
    <label><b>Note (Optional)</b></label>
    <textarea name="note" class="form-control" rows="3"
        placeholder="Enter any additional note (optional)"></textarea>
</div>

<!-- TOTAL -->
<div class="row">
<div class="col-md-6"></div>

<div class="col-md-6">
<div class="total-box">
<h6>Subtotal: AED <span id="subtotal">0.00</span></h6>
<h6>VAT: AED <span id="vat">0.00</span></h6>
<h4><b>Total: AED <span id="grand-total">0.00</span></b></h4>
</div>
</div>
</div>

<!-- ACTION -->
<div class="mt-4 d-flex justify-content-between">
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back</a>
    <!-- <button type="submit" class="btn btn-gradient">Save Invoice</button> -->
     <button type="submit" class="btn btn-gradient" id="saveBtn">
    Save Invoice
</button>
</div>

</form>

</div>
</div>

<script>
function fillDescription(select) {
    let row = select.closest("tr");
    let description = select.options[select.selectedIndex].getAttribute("data-description");
    let price = select.options[select.selectedIndex].getAttribute("data-price");

    let desc = row.querySelector("textarea");
    let priceInput = row.querySelector(".price");

    if (select.value) {
        desc.value = description || "";
        priceInput.value = price || "";
        priceInput.readOnly = true;
    } else {
        desc.value = "";
        priceInput.value = "";
        priceInput.readOnly = false;
    }

    calculateRow(priceInput);
}

function calculateRow(el) {
    let row = el.closest("tr");

    let price = parseFloat(row.querySelector(".price").value) || 0;
    let qty = parseFloat(row.querySelector("input[name='quantity']").value) || 0;

    let total = price * qty;
    row.querySelector(".row-total").value = total.toFixed(2);

    calculateTotal();
}

function calculateTotal() {
    let subtotal = 0;

    document.querySelectorAll(".row-total").forEach(el => {
        subtotal += parseFloat(el.value) || 0;
    });

    let vat = subtotal * 0.05;
    let grandTotal = subtotal + vat;

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("vat").innerText = vat.toFixed(2);
    document.getElementById("grand-total").innerText = grandTotal.toFixed(2);
}

function addRow() {
    let table = document.querySelector("#items-table tbody");
    let row = table.rows[0].cloneNode(true);

    row.querySelectorAll("input, textarea").forEach(el => el.value = "");
    row.querySelector(".row-total").value = "";

    table.appendChild(row);
}

function deleteRow(btn) {
    btn.closest("tr").remove();
    calculateTotal();
}

window.onload = calculateTotal;
</script>
<script>
document.querySelector("form").addEventListener("submit", function () {
    let btn = document.getElementById("saveBtn");

    btn.disabled = true;
    btn.innerText = "Saving...";   // 🔥 UX feedback

    // Optional: add spinner
    btn.innerHTML = "Saving... ⏳";
});
</script>

</body>
</html>
