{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Supplier</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background: #f5f6fa;
            font-family: Calibri, sans-serif;
        }

        /* MAIN BOX */
        .container-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-top: 20px;
            width: 100%;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo {
            height: 80px;
        }

        .company-info {
            font-size: 13px;
            color: #444;
            line-height: 1.6;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        /* FORM */
        .form-control {
            border-radius: 6px;
            padding: 10px;
        }

        textarea.form-control {
            resize: none;
        }

        /* BUTTON */
        .btn-gradient {
            background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .container-fluid {
                padding: 8px;
            }

            .container-box {
                padding: 15px;
                border-radius: 10px;
                margin-top: 10px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .logo {
                height: 60px;
            }

            .title {
                font-size: 18px;
            }

            .company-info {
                font-size: 12px;
            }

            .d-flex {
                flex-direction: column !important;
                gap: 10px;
            }

            .btn {
                width: 100%;
            }
        }

    </style>
</head>

<body>

<div class="container-fluid px-2">
<div class="container-box">

    <!-- HEADER -->
    <div class="header">

        <div class="d-flex align-items-center gap-3">

            <img src="{% static 'logo6.png' %}" class="logo">

            <div class="company-info">
                <b>CREDO INTERNATIONAL DIGITAL DESIGNS</b><br>
                Mussaffa 45 - Abu Dhabi, UAE<br>
                TRN: 105189276600001<br>
                📞 +971566981200<br>
                ✉ info@credodesigns.ae
            </div>

        </div>

        <div class="text-md-end">
            <div class="title">EDIT SUPPLIER</div>
            <small class="text-muted">Update supplier details</small>
        </div>

    </div>

    <!-- FORM -->
    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label"><b>Supplier Name</b></label>
            <input type="text" name="name" value="{{ supplier.name }}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label"><b>TRN Number</b></label>
            <input type="text" name="trn_number" value="{{ supplier.trn_number }}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Phone Number</b></label>
            <input type="text" name="phone" value="{{ supplier.phone }}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Email Address</b></label>
            <input type="email" name="email" value="{{ supplier.email }}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Website</b></label>
            <input type="text" name="website" value="{{ supplier.website }}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label"><b>Address</b></label>
            <textarea name="address" class="form-control" rows="3">{{ supplier.address }}</textarea>
        </div>

        <!-- ACTION -->
        <div class="mt-4 d-flex justify-content-between">

            <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                Back
            </a>

            <button type="submit" class="btn btn-gradient">
                Update Supplier
            </button>

        </div>

    </form>

</div>
</div>

</body>
</html>
