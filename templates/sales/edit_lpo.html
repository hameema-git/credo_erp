{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit LPO</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Calibri, sans-serif;
            background: #f5f6fa;
        }

        .container-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            height: 70px;
        }

        .company-info {
            font-size: 13px;
            color: #555;
        }

        .table thead {
            background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
            color: white;
        }

        .desc-box {
            min-height: 40px;
        }

        .total-box {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
        }

        .btn-gradient {
            background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-3">
<div class="container-box">

<!-- HEADER -->
<div class="header">
    <div class="d-flex align-items-center gap-3">
        <img src="{% static 'logo6.png' %}" class="logo">
        <div class="company-info">
            <b>CREDO INTERNATIONAL DIGITAL DESIGNS</b><br>
            TRN: 105189276600001<br>
            Abu Dhabi, UAE<br>
        </div>
    </div>

    <h4><b>EDIT LPO - {{ lpo.number }}</b></h4>
</div>

<form method="POST">
{% csrf_token %}

<!-- SUPPLIER -->
<div class="mb-4">
    <label><b>Supplier</b></label>

 
    <select name="supplier" class="form-select" required>
        {% for s in suppliers %}
        <option value="{{ s.id }}" {% if s.id == lpo.supplier.id %}selected{% endif %}>
            {{ s.name }}
        </option>
        {% endfor %}
    </select>
</div>
   <div class="mb-3">
    <label><b>Quotation Ref</b></label>
    <input type="text" name="quote_ref"
           value="{{ lpo.quote_ref }}"
           class="form-control">
</div>


<!-- DATE -->
<div class="row mb-4">
    <div class="col-md-6">
        <label><b>Delivery Date</b></label>
        <input type="date" name="delivery_date"
               value="{{ lpo.delivery_date|date:'Y-m-d' }}"
               class="form-control">
    </div>
</div>

<!-- ITEMS -->
<h5><b>Items</b></h5>

<div class="table-responsive">
<table class="table table-bordered" id="items-table">
<thead>
<tr>
    <th>Description</th>
    <th>Unit Price</th>
    <th>Qty</th>
    <th>Total</th>
    <th>Action</th>
</tr>
</thead>

<tbody>

{% for item in lpo.items.all %}
<tr>
<td>
<textarea name="description" class="form-control desc-box">{{ item.description }}</textarea>
</td>

<td>
<input type="number" step="0.01" name="price"
       value="{{ item.price }}"
       class="form-control price"
       oninput="calculateRow(this)">
</td>

<td>
<input type="number" name="quantity"
       value="{{ item.quantity }}"
       class="form-control"
       oninput="calculateRow(this)">
</td>

<td>
<input type="text" class="form-control row-total"
       value="{{ item.total }}" readonly>
</td>

<td>
<button type="button" class="btn btn-danger btn-sm" onclick="deleteRow(this)">Delete</button>
</td>
</tr>
{% endfor %}

</tbody>
</table>
</div>

<button type="button" class="btn btn-secondary mb-3" onclick="addRow()">+ Add Item</button>

<!-- NOTE -->
<div class="mb-4">
    <label><b>Note</b></label>
    <textarea name="note" class="form-control" rows="3">{{ lpo.note }}</textarea>
</div>

<!-- TOTAL -->
<div class="row">
<div class="col-md-6"></div>

<div class="col-md-6">
<div class="total-box text-end">
<h6>Subtotal: AED <span id="subtotal">0.00</span></h6>
<h6>VAT (5%): AED <span id="vat">0.00</span></h6>
<h4><b>Total: AED <span id="grand-total">0.00</span></b></h4>
</div>
</div>
</div>

<!-- ACTION -->
<div class="mt-4 d-flex justify-content-between">
    <a href="{% url 'lpo_detail' lpo.id %}" class="btn btn-secondary">Back</a>
    <button type="submit" class="btn btn-gradient">Update LPO</button>
</div>

</form>

</div>
</div>

function calculateRow(el) {
    let row = el.closest("tr");

    let price = parseFloat(row.querySelector(".price").value) || 0;
    let qty = parseFloat(row.querySelector("input[name='quantity']").value) || 0;

    let base = price * qty;
    let vat = base * 0.05;
    let total = base + vat;

    row.querySelector(".row-total").value = total.toFixed(2);

    calculateTotal();
}




function calculateTotal() {
    let subtotal = 0;
    let totalVat = 0;
    let grandTotal = 0;

    document.querySelectorAll("#items-table tbody tr").forEach(row => {
        let price = parseFloat(row.querySelector(".price").value) || 0;
        let qty = parseFloat(row.querySelector("input[name='quantity']").value) || 0;

        let base = price * qty;
        let vat = base * 0.05;
        let total = base + vat;

        subtotal += base;
        totalVat += vat;
        grandTotal += total;
    });

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("vat").innerText = totalVat.toFixed(2);
    document.getElementById("grand-total").innerText = grandTotal.toFixed(2);
}





function addRow() {
    let table = document.querySelector("#items-table tbody");
    let row = table.rows[0].cloneNode(true);

    row.querySelectorAll("input, textarea").forEach(el => el.value = "");
    row.querySelector(".row-total").value = "";

    table.appendChild(row);
}

function deleteRow(btn) {
    btn.closest("tr").remove();
    calculateTotal();
}

// window.onload = calculateTotal;

window.onload = function() {
    document.querySelectorAll("#items-table tbody tr").forEach(row => {
        let priceInput = row.querySelector(".price");
        if (priceInput) {
            calculateRow(priceInput);  // 🔥 force recalculation
        }
    });
};
</script>

</body>
</html>
