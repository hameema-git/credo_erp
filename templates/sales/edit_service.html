{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Edit Service</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    font-family: Calibri, sans-serif;
    background: #f5f6fa;
}

/* MAIN BOX */
.container-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-top: 30px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.logo {
    height: 80px;
}

.company-info {
    font-size: 13px;
    color: #555;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

/* INPUT */
.form-control {
    border-radius: 8px;
}

/* BUTTON */
.btn-gradient {
    background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
    border: none;
    color: white;
}

/* CARD LOOK */
.section-box {
    background: #f1f2f6;
    padding: 15px;
    border-radius: 8px;
}

</style>
</head>

<body>

<div class="container">
<div class="container-box">

<!-- HEADER -->
<div class="header">

    <div class="d-flex align-items-center gap-3">
        <img src="{% static 'logo6.png' %}" class="logo">

        <div class="company-info">
            <b>CREDO INTERNATIONAL DIGITAL DESIGNS</b><br>
            Abu Dhabi, UAE<br>
             +971566981200
        </div>
    </div>

    <div class="title">EDIT SERVICE</div>

</div>

<form method="post">
{% csrf_token %}

<!-- SERVICE INFO -->
<div class="section-box">

    <div class="mb-3">
        <label><b>Service Name</b></label>
        <input type="text" name="name"
               class="form-control"
               value="{{ service.name }}" required>
    </div>

    <div class="mb-3">
        <label><b>Price (AED)</b></label>
        <input type="number" step="0.01" name="price"
               class="form-control"
               value="{{ service.price }}" required>
    </div>

    <div class="mb-3">
        <label><b>Description</b></label>
        <textarea name="description"
                  class="form-control"
                  rows="3">{{ service.description }}</textarea>
    </div>

</div>

<!-- ACTION -->
<div class="mt-4 d-flex justify-content-between">

    <a href="{% url 'dashboard' %}" class="btn btn-secondary">
        Back
    </a>

    <button type="submit" class="btn btn-gradient">
        Update Service
    </button>

</div>

</form>

</div>
</div>

</body>
</html>
