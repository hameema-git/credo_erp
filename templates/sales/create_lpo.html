{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Create LPO</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Calibri, sans-serif;
            background: #f5f6fa;
        }

        .container-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            height: 70px;
        }

        .company-info {
            font-size: 13px;
            color: #555;
        }

        .table thead {
            background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
            color: white;
        }

        .desc-box {
            min-height: 40px;
            resize: none;
        }

        .total-box {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 8px;
        }

        .btn-gradient {
            background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-3">
<div class="container-box">

<!-- HEADER -->
<div class="header">
    <div class="d-flex align-items-center gap-3">
        <img src="{% static 'logo6.png' %}" class="logo">
        <div class="company-info">
            <b>CREDO INTERNATIONAL DIGITAL DESIGNS</b><br>
            TRN: 105189276600001<br>
            Abu Dhabi, UAE<br>
            +971566981200
        </div>
    </div>

    <h4><b>LOCAL PURCHASE ORDER</b></h4>
</div>

<form method="POST">
{% csrf_token %}

<div class="mb-4">
    <label><b>Supplier</b></label>

    <select name="supplier" class="form-select" required>
        <option value="">Select Supplier</option>
        {% for s in suppliers %}
        <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
    </select>

    <a href="{% url 'add_supplier' %}" class="btn btn-sm btn-success mt-2">
        + Add Supplier
    </a>
</div>

<!-- DATES -->
<div class="row mb-4">
    <div class="col-md-6">
        <label><b>Delivery Date</b></label>
        <input type="date" name="delivery_date" class="form-control">
    </div>
</div>

<!-- ITEMS -->
<h5><b>Items</b></h5>

<div class="table-responsive">
<table class="table table-bordered" id="items-table">
<thead>
<tr>
    <th>Description</th>
    <th>Unit Price</th>
    <th>Qty</th>
    <th>Total</th>
    <th>Action</th>
</tr>
</thead>

<tbody>
<tr>
<td>
<textarea name="description" class="form-control desc-box"></textarea>
</td>

<td>
<input type="number" step="0.01" name="price" class="form-control price" oninput="calculateRow(this)">
</td>

<td>
<input type="number" name="quantity" value="1" class="form-control" oninput="calculateRow(this)">
</td>

<td>
<input type="text" class="form-control row-total" readonly>
</td>

<td>
<button type="button" class="btn btn-danger btn-sm" onclick="deleteRow(this)">Delete</button>
</td>
</tr>
</tbody>
</table>
</div>

<button type="button" class="btn btn-secondary mb-3" onclick="addRow()">+ Add Item</button>

<!-- NOTE -->
<div class="mb-4">
    <label><b>Note</b></label>
    <textarea name="note" class="form-control" rows="3"></textarea>
</div>

<!-- TOTAL -->
<div class="row">
<div class="col-md-6"></div>

<div class="col-md-6">
<div class="total-box text-end">
<h6>Subtotal: AED <span id="subtotal">0.00</span></h6>
<h6>VAT (5%): AED <span id="vat">0.00</span></h6>
<h4><b>Total: AED <span id="grand-total">0.00</span></b></h4>
</div>
</div>
</div>

<!-- ACTION -->
<div class="mt-4 d-flex justify-content-between">
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back</a>
    <button type="submit" class="btn btn-gradient">Save LPO</button>
</div>

</form>

</div>
</div>

<script>
function calculateRow(el) {
    let row = el.closest("tr");

    let price = parseFloat(row.querySelector(".price").value) || 0;
    let qty = parseFloat(row.querySelector("input[name='quantity']").value) || 0;

    // let total = price * qty;

    let base = price * qty;
    let vat = base * 0.05;
    let total = base + vat;
    row.querySelector(".row-total").value = total.toFixed(2);

    calculateTotal();
}

// function calculateTotal() {
//     let subtotal = 0;

//     document.querySelectorAll(".row-total").forEach(el => {
//         subtotal += parseFloat(el.value) || 0;
//     });

//     let vat = subtotal * 0.05;
//     let grandTotal = subtotal + vat;

//     document.getElementById("subtotal").innerText = subtotal.toFixed(2);
//     document.getElementById("vat").innerText = vat.toFixed(2);
//     document.getElementById("grand-total").innerText = grandTotal.toFixed(2);
// }

function calculateTotal() {
    let subtotal = 0;
    let totalVat = 0;
    let grandTotal = 0;

    document.querySelectorAll("#items-table tbody tr").forEach(row => {
        let price = parseFloat(row.querySelector(".price").value) || 0;
        let qty = parseFloat(row.querySelector("input[name='quantity']").value) || 0;

        let base = price * qty;
        let vat = base * 0.05;
        let total = base + vat;

        subtotal += base;
        totalVat += vat;
        grandTotal += total;
    });

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("vat").innerText = totalVat.toFixed(2);
    document.getElementById("grand-total").innerText = grandTotal.toFixed(2);
}

function addRow() {
    let table = document.querySelector("#items-table tbody");
    let row = table.rows[0].cloneNode(true);

    row.querySelectorAll("input, textarea").forEach(el => el.value = "");
    row.querySelector(".row-total").value = "";

    table.appendChild(row);
}

function deleteRow(btn) {
    btn.closest("tr").remove();
    calculateTotal();
}

window.onload = calculateTotal;
</script>

</body>
</html>
