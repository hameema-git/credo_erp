{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Edit Customer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
    font-family: Calibri, sans-serif;
    background: #f5f6fa;
}

.container-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-top: 30px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.logo {
    height: 80px;
}

.company-info {
    font-size: 13px;
    color: #555;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.btn-gradient {
    background: linear-gradient(90deg,#362c7a,#741960,#d0153e);
    border: none;
    color: white;
}

</style>
</head>

<body>

<div class="container">
<div class="container-box">

<!-- HEADER -->
<div class="header">

    <div class="d-flex align-items-center gap-3">
        <img src="{% static 'logo6.png' %}" class="logo">

        <div class="company-info">
            <b>CREDO INTERNATIONAL DIGITAL DESIGNS</b><br>
            Abu Dhabi, UAE<br>
             +971566981200
        </div>
    </div>

    <div class="title">EDIT CUSTOMER</div>

</div>

<form method="post">
{% csrf_token %}

<div class="mb-3">
    <label><b>Name</b></label>
    <input type="text" name="name" class="form-control"
           value="{{ customer.name }}" required>
</div>

<div class="mb-3">
    <label><b>Phone</b></label>
    <input type="text" name="phone" class="form-control"
           value="{{ customer.phone }}">
</div>

<div class="mb-3">
    <label><b>Email</b></label>
    <input type="email" name="email" class="form-control"
           value="{{ customer.email }}">
</div>

<div class="mb-3">
    <label><b>Address</b></label>
    <textarea name="address" class="form-control">{{ customer.address }}</textarea>
</div>

<div class="mb-3">
    <label><b>TRN Number</b></label>
    <input type="text" name="trn_number" class="form-control"
           value="{{ customer.trn_number }}">
</div>

<div class="d-flex justify-content-between mt-4">

    <a href="{% url 'dashboard' %}" class="btn btn-secondary">
        Back
    </a>

    <button type="submit" class="btn btn-gradient">
        Update Customer
    </button>

</div>

</form>

</div>
</div>

</body>
</html>
