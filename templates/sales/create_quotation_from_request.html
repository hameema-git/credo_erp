<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Quotation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.section-title{
    font-size:18px;
    font-weight:600;
    margin-bottom:20px;
}

.table td,
.table th{
    vertical-align:middle;
}

</style>

</head>

<body>

<div class="container py-5">

<div class="card">

<div class="card-body p-4">

<h3>Create Quotation</h3>

<p class="text-muted">
This quotation is being generated from an approved work request.
</p>

<hr>

<form method="post">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Quotation Number</label>

<input
class="form-control"
value="Auto Generated"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Customer</label>

<input
class="form-control"
value="{{ work_request.customer_name }}"
>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Attention</label>

<input
type="text"
name="attention"
class="form-control"
value="{{ work_request.requested_by.get_full_name|default:work_request.requested_by.username }}">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Sales Person</label>

<input
type="text"
name="sales_person"
class="form-control">

</div>

</div>

<hr>

<h5 class="section-title">
Request Details
</h5>

<div class="mb-3">

<label class="form-label">
Title
</label>

<input
class="form-control"
value="{{ work_request.title }}"
readonly>

</div>

<div class="mb-3">

<label class="form-label">
Description
</label>

<textarea
class="form-control"
rows="5"
readonly>{{ work_request.description }}</textarea>

</div>

<hr>

<h5 class="section-title">
Quotation Items
</h5>

<table class="table table-bordered">

<thead>

<tr>

<th>Description</th>

<th width="120">Qty</th>

<th width="160">Price</th>

<th width="160">Total</th>

</tr>

</thead>

<tbody id="items-body">

<tr>

<td>

<input
type="text"
name="description"
class="form-control"
value="{{ work_request.title }}">

</td>

<td>

<input
type="number"
name="quantity"
value="1"
class="form-control">

</td>

<td>

<input
type="number"
step="0.01"
name="price"
class="form-control">

</td>

<td>

<input
type="text"
class="form-control"
placeholder="Auto">

</td>

</tr>

</tbody>

</table>

<button
type="button"
class="btn btn-outline-primary"
onclick="addRow()">

+ Add Item

</button>

<hr>

<div class="mb-3">

<label class="form-label">
Notes
</label>

<textarea
name="note"
rows="4"
class="form-control">{{ work_request.description }}</textarea>

</div>

<div class="d-flex justify-content-end gap-2">

<a
href="{% url 'work_request_detail' work_request.id %}"
class="btn btn-secondary">

Cancel

</a>

<button
class="btn btn-success">

Create Quotation

</button>

</div>

</form>

</div>

</div>

</div>

<script>

function addRow(){

let tbody=document.getElementById("items-body");

let row=`
<tr>

<td>

<input
type="text"
name="description"
class="form-control">

</td>

<td>

<input
type="number"
name="quantity"
value="1"
class="form-control">

</td>

<td>

<input
type="number"
step="0.01"
name="price"
class="form-control">

</td>

<td>

<input
type="text"
class="form-control"
placeholder="Auto">

</td>

</tr>
`;

tbody.insertAdjacentHTML("beforeend",row);

}

</script>

</body>
</html>
