<!DOCTYPE html>
<html>
<head>

    <title>Credo Task Management</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta http-equiv="Cache-Control"
          content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #4B1F6F 0%,
                #7B1FA2 45%,
                #C2185B 100%
            );

            display:flex;
            justify-content:center;
            align-items:center;

            padding:15px;

            overflow:hidden;
        }

        .login-card{

            width:100%;
            max-width:420px;

            border:none;

            border-radius:22px;

            background:
            rgba(255,255,255,0.96);

            backdrop-filter:blur(10px);

            box-shadow:
            0 15px 35px rgba(0,0,0,0.25);
        }

        .logo{

            width:90px;
            height:auto;

            object-fit:contain;
        }

        .card-body{
            padding:25px;
        }

        .title{
            font-weight:700;
            font-size:24px;
            color:#4B1F6F;
        }

        .form-control{

            border-radius:12px;

            padding:10px 12px;

            font-size:14px;
        }

        .password-wrapper{
            position:relative;
        }

        .eye-btn{

            position:absolute;

            right:15px;

            top:50%;

            transform:translateY(-50%);

            cursor:pointer;

            color:#666;
        }

        .btn-login{

            background:
            linear-gradient(
                90deg,
                #4B1F6F,
                #C2185B
            );

            border:none;

            color:white;

            border-radius:12px;

            padding:10px;

            font-weight:600;
        }

        .btn-login:hover{
            opacity:0.95;
            color:white;
        }

        .signup-btn{
            border-radius:10px;
        }

        .footer-text{
            font-size:12px;
            color:#666;
        }

        hr{
            margin:15px 0;
        }

        @media(max-width:768px){

            body{
                overflow:auto;
                padding:10px;
            }

            .login-card{
                max-width:100%;
            }

            .logo{
                width:75px;
            }

            .card-body{
                padding:20px;
            }

            .title{
                font-size:20px;
            }

            .btn{
                font-size:14px;
            }
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="card-body">

        <!-- LOGO -->

        <div class="text-center mb-2">

            <img src="/static/logo6.png"
                 class="logo"
                 alt="Credo Logo">

        </div>

        <!-- TITLE -->

        <h4 class="title text-center mb-3">
            Credo Management
        </h4>

        <!-- ALERTS -->

        {% if messages %}
            {% for message in messages %}

                <div class="alert
                    {% if message.tags == 'error' %}
                        alert-danger
                    {% else %}
                        alert-warning
                    {% endif %}
                    py-2 text-center">

                    {{ message }}

                </div>

            {% endfor %}
        {% endif %}

        <!-- LOGIN FORM -->

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter username"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label fw-semibold">
                    Password
                </label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="Enter password"
                        required>

                    <i id="togglePassword"
                       class="bi bi-eye eye-btn"
                       onclick="togglePassword()">
                    </i>

                </div>

            </div>

            <div class="d-grid">

                <!-- <button
                    type="submit"
                    class="btn btn-login">

                    Login

                </button> -->

                <button
    type="submit"
    class="btn btn-login"
    id="loginBtn">

    Login

</button>

            </div>

        </form>

        <hr>

        <!-- SIGNUP -->

        <div class="text-center">

            <small class="text-muted">
                New User Registration
            </small>

            <div class="d-grid gap-2 mt-3">

                <a href="{% url 'signup_freelancer' %}"
                   class="btn btn-outline-primary signup-btn">

                    👨‍💻 Freelancer Registration

                </a>

                <a href="{% url 'signup_employee' %}"
                   class="btn btn-outline-success signup-btn">

                    👨‍💼 Employee Registration

                </a>

            </div>

            <small class="text-danger d-block mt-3">

                Accounts require manager approval before login

            </small>

        </div>

        <div class="text-center mt-3">

            <small class="footer-text">

                © Credo Digital Designs

            </small>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    const password =
        document.getElementById("password");

    const icon =
        document.getElementById("togglePassword");

    if(password.type === "password"){

        password.type = "text";

        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");

    }
    else{

        password.type = "password";

        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    }
}

</script>

<script>

document.querySelector("form").addEventListener(
    "submit",
    function(){

        let btn =
            document.getElementById("loginBtn");

        btn.disabled = true;

        btn.innerHTML = `
            <span class="spinner-border spinner-border-sm me-2"></span>
            Logging In...
        `;
    }
);

</script>

</body>
</html>
