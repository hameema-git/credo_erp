<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Work Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f6fa;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,.08);
        }

        .btn-primary{
            background:#6f42c1;
            border:none;
        }

        .btn-primary:hover{
            background:#5a33a5;
        }

        .container{
            max-width:800px;
        }
    </style>

</head>
<body>

<div class="container py-5">

    <a href="{% url 'my_requests' %}" class="btn btn-light mb-4">
        ← Back
    </a>

    <div class="card">

        <div class="card-body p-4">

            <h3 class="mb-1">
                Create Work Request
            </h3>

            <p class="text-muted mb-4">
                Submit your project requirement to the administrator.
            </p>

            {% if errors %}
            <div class="alert alert-danger">
                <ul class="mb-0">
                    {% for error in errors %}
                    <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Customer Name
                    </label>

                    <input
                        type="text"
                        name="customer_name"
                        class="form-control"
                        value="{{ form_data.customer_name|default:'' }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Request Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        value="{{ form_data.title|default:'' }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Project Description
                    </label>

                    <textarea
                        name="description"
                        class="form-control"
                        rows="6"
                        required>{{ form_data.description|default:'' }}</textarea>
                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Priority
                        </label>

                        <select
                            name="priority"
                            class="form-select">

                            {% for value,label in priority_choices %}

                            <option
                                value="{{ value }}"
                                {% if form_data.priority == value %}
                                    selected
                                {% elif value == "medium" %}
                                    selected
                                {% endif %}
                            >
                                {{ label }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Required Date
                        </label>

                        <input
                            type="date"
                            name="required_date"
                            class="form-control"
                            value="{{ form_data.required_date|default:'' }}">

                    </div>

                </div>

                <div class="mt-4">

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Submit Request

                    </button>

                    <a
                        href="{% url 'my_requests' %}"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
