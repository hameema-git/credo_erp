<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Work Request</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f6fa;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 8px 25px rgba(0,0,0,.08);
        }

        .page-title{
            font-weight:700;
        }
    </style>

</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card">

                <div class="card-body p-4">

                    <a href="{% url 'my_requests' %}" class="text-decoration-none">
                        ← Back
                    </a>

                    <h3 class="page-title mt-3">

                        {% if action == "Edit" %}
                            Edit Work Request
                        {% else %}
                            Create Work Request
                        {% endif %}

                    </h3>

                    <p class="text-muted mb-4">
                        Submit a new work request for manager approval.
                    </p>

                    {% if errors %}
                    <div class="alert alert-danger">
                        <ul class="mb-0">
                            {% for error in errors %}
                                <li>{{ error }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Customer Name
                            </label>

                            <input
                                type="text"
                                name="customer_name"
                                class="form-control"
                                value="{{ form_data.customer_name|default:work_request.customer_name|default:'' }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Work Title
                            </label>

                            <input
                                type="text"
                                name="title"
                                class="form-control"
                                value="{{ form_data.title|default:work_request.title|default:'' }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea
                                name="description"
                                rows="5"
                                class="form-control"
                                required>{{ form_data.description|default:work_request.description|default:'' }}</textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Priority
                                </label>

                                <select name="priority" class="form-select">

                                    {% for value,label in priority_choices %}

                                    <option value="{{ value }}"

                                    {% if form_data.priority == value %}
                                        selected
                                    {% elif work_request.priority == value %}
                                        selected
                                    {% elif value == 'medium' %}
                                        selected
                                    {% endif %}

                                    >

                                        {{ label }}

                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Required Date
                                </label>

                                <input
                                    type="date"
                                    name="required_date"
                                    class="form-control"
                                    value="{{ form_data.required_date|default:work_request.required_date|date:'Y-m-d'|default:'' }}">

                            </div>

                        </div>

                        <div class="mt-4">

                            <button class="btn btn-primary">

                                {% if action == "Edit" %}
                                    Save Changes
                                {% else %}
                                    Submit Request
                                {% endif %}

                            </button>

                            <a href="{% url 'my_requests' %}" class="btn btn-secondary">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
